<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Warp Camera Android</title>
    <style>
        body { 
            margin: 0; 
            overflow: hidden; 
            background: #000; 
            font-family: sans-serif; 
            user-select: none;
            -webkit-user-select: none;
        }
        #canvas { 
            position: absolute; 
            top: 0; 
            left: 0; 
            width: 100vw; 
            height: 100vh; 
            object-fit: cover; /* Растягивает камеру на весь экран телефона */
        }
        /* Интерфейс управления поверх камеры */
        .ui-panel { 
            position: absolute; 
            bottom: 30px; 
            left: 50%; 
            transform: translateX(-50%); 
            display: flex; 
            gap: 15px; 
            background: rgba(0, 0, 0, 0.6); 
            padding: 12px 20px; 
            border-radius: 30px; 
            z-index: 10;
            backdrop-filter: blur(5px);
            align-items: center;
        }
        .btn {
            background: #ff3366;
            color: white;
            border: none;
            padding: 10px 15px;
            font-size: 18px;
            font-weight: bold;
            border-radius: 50%;
            width: 45px;
            height: 45px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .btn:active {
            background: #ff0044;
            transform: scale(0.9);
        }
        #info {
            color: white;
            font-size: 14px;
            min-width: 90px;
            text-align: center;
        }
    </style>
</head>
<body>

    <canvas id="canvas"></canvas>

    <div class="ui-panel">
        <button class="btn" onclick="changeRadius(-15)">−</button>
        <div id="info">Размер: <span id="rad-val">100</span></div>
        <button class="btn" onclick="changeRadius(15)">+</button>
    </div>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        const video = document.createElement('video');
        
        // Для корректной работы видео на iOS/Android
        video.setAttribute('playsinline', '');
        video.setAttribute('autoplay', '');
        video.muted = true;

        let warpX = 0, warpY = 0;
        let radius = 100;
        const strength = 1.7; // Сила эффекта вздутия объекта

        // Запуск камеры. facingMode: "environment" принудительно включает заднюю камеру (на чехле)
        navigator.mediaDevices.getUserMedia({ 
            video: { 
                facingMode: "environment",
                width: { ideal: 1280 },
                height: { ideal: 720 }
            } 
        })
        .then(stream => {
            video.srcObject = stream;
            video.play();
        })
        .catch(err => {
            alert("Не удалось запустить основную камеру, включаю дефолтную.");
            navigator.mediaDevices.getUserMedia({ video: true })
                .then(stream => { video.srcObject = stream; video.play(); });
        });

        video.addEventListener('loadedmetadata', () => {
            // Подстраиваем внутреннее разрешение холста под видеопоток
            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;
            warpX = canvas.width / 2;
            warpY = canvas.height / 2;
            requestAnimationFrame(draw);
        });

        // Функция изменения радиуса по кнопкам +/-
        function changeRadius(amount) {
            radius = Math.max(40, Math.min(250, radius + amount));
            document.getElementById('rad-val').innerText = radius;
        }

        // Отслеживание касания пальца (Touch) на Android
        function handleTouch(e) {
            if (e.touches.length > 0) {
                const rect = canvas.getBoundingClientRect();
                const touch = e.touches[0];
                
                // Пересчитываем координаты экрана в координаты матрицы видеокадра
                warpX = (touch.clientX - rect.left) * (canvas.width / rect.width);
                warpY = (touch.clientY - rect.top) * (canvas.height / rect.height);
            }
        }

        window.addEventListener('touchstart', handleTouch);
        window.addEventListener('touchmove', handleTouch);

        function draw() {
            if (video.readyState === video.HAVE_CURRENT_DATA) {
                // 1. Отрисовка кадра с камеры в реальном времени
                ctx.drawImage(video, 0, 0, canvas.width, canvas.height);

                // 2. Вырезаем кусок изображения под пальцем для деформации
                const size = radius * 2;
                const sx = Math.max(0, warpX - radius);
                const sy = Math.max(0, warpY - radius);
                
                if (sx + size <= canvas.width && sy + size <= canvas.height) {
                    const imgData = ctx.getImageData(sx, sy, size, size);
                    const origPixels = new Uint8ClampedArray(imgData.data);
                    
                    // 3. Алгоритм деформации пикселей
                    for (let y = 0; y < size; y++) {
                        for (let x = 0; x < size; x++) {
                            const dx = x - radius;
                            const dy = y - radius;
                            const dist = Math.sqrt(dx*dx + dy*dy);

                            if (dist < radius) {
                                const normDist = dist / radius;
                                const warpFactor = Math.pow(normDist, strength);
                                
                                const srcX = Math.round(radius + dx * warpFactor);
                                const srcY = Math.round(radius + dy * warpFactor);

                                const targetIdx = (y * size + x) * 4;
                                const srcIdx = (srcY * size + srcX) * 4;

                                // Копируем деформированный пиксель
                                imgData.data[targetIdx] = origPixels[srcIdx];
                                imgData.data[targetIdx+1] = origPixels[srcIdx+1];
                                imgData.data[targetIdx+2] = origPixels[srcIdx+2];
                            }
                        }
                    }
                    // Возвращаем измененную область обратно на экран
                    ctx.putImageData(imgData, sx, sy);
                }

                // Рисуем аккуратный круг-индикатор вокруг области искажения
                ctx.beginPath();
                ctx.arc(warpX, warpY, radius, 0, 2 * Math.PI);
                ctx.strokeStyle = 'rgba(255, 51, 102, 0.4)';
                ctx.lineWidth = 3;
                ctx.stroke();
            }
            requestAnimationFrame(draw);
        }
    </script>
</body>
</html>
